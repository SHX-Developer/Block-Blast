server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/javascript application/javascript application/json image/svg+xml application/wasm;

    # Security headers (kept loose enough for Telegram WebApp SDK)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Hashed Vite assets — immutable, cache forever
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Other static assets
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico|wasm)$ {
        expires    7d;
        add_header Cache-Control "public, max-age=604800";
        try_files  $uri =404;
    }

    # SPA fallback — index.html must never cache
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files  $uri $uri/ /index.html;
    }

    # Healthcheck
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
